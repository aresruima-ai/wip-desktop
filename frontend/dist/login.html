<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI数字化看板</title>
    <link rel="stylesheet" href="common.css">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.update(); });
        });
    }
    </script>
    <script src="common.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0166B1">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        @keyframes f1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(80px,50px) scale(1.2)}}
        @keyframes f2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-60px,-70px) scale(1.2)}}
        @keyframes f3{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,45px)}}
        @keyframes scanDown{0%{transform:translateY(-4px)}100%{transform:translateY(100vh)}}
        @keyframes borderSpin{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
        @keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(0.92)}to{opacity:1;transform:none}}
        @keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
        @keyframes typing{to{width:100%}}
        @keyframes blink{50%{border-color:transparent}}
        @keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        @keyframes sweep{0%{transform:translateX(-100%)}50%{transform:translateX(150%)}100%{transform:translateX(150%)}}
        @keyframes ringPulse{0%{transform:scale(1);opacity:0.3}100%{transform:scale(1.15);opacity:0}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.6)}}
        @keyframes brainPulse{0%,100%{opacity:0.06}50%{opacity:0.12}}
        @keyframes nodeGlow{0%,100%{r:2;opacity:0.4}50%{r:3;opacity:0.8}}
        @keyframes dataFlow{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
        @keyframes aiTextGlow{0%,100%{text-shadow:none}50%{text-shadow:none}}

        body{display:flex!important;align-items:center!important;justify-content:center!important;min-height:100vh!important;background:var(--bg-canvas)!important;overflow:hidden!important;font-family:var(--font)!important}
        .grid-floor{position:fixed;bottom:0;left:-50%;width:200%;height:55vh;z-index:0;
            background-image:linear-gradient(rgba(var(--brand-rgb),0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(var(--brand-rgb),0.03) 1px,transparent 1px);
            background-size:60px 60px;transform:perspective(400px) rotateX(65deg);transform-origin:center bottom}
        .grid-floor::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,var(--bg-canvas) 0%,transparent 40%,transparent 80%,var(--bg-canvas) 100%)}
        .scanline{position:fixed;left:0;right:0;height:2px;z-index:4;pointer-events:none;
            background:linear-gradient(90deg,transparent 5%,rgba(var(--brand-rgb),0.06) 30%,rgba(var(--brand-rgb),0.04) 70%,transparent 95%);
            box-shadow:none;animation:scanDown 5s linear infinite;opacity:0.35}
        .crt{position:fixed;inset:0;z-index:4;pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.015) 3px,rgba(0,0,0,0.015) 6px)}
        .bg-glow{position:fixed;border-radius:50%;filter:blur(120px);z-index:0;pointer-events:none}
        .g1{width:500px;height:500px;background:rgba(var(--brand-rgb),0.04);top:-150px;left:-150px;animation:f1 7s ease-in-out infinite}
        .g2{width:400px;height:400px;background:rgba(var(--brand-rgb),0.06);bottom:-120px;right:-120px;animation:f2 9s ease-in-out infinite}
        .g3{width:300px;height:300px;background:rgba(var(--cyan-rgb),0.04);top:35%;left:65%;animation:f3 11s ease-in-out infinite}
        canvas{position:fixed;inset:0;pointer-events:none}
        #neuralNet{z-index:0}#particles{z-index:1}
        /* AI Brain SVG */
        .ai-brain{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:0;pointer-events:none;opacity:0.06;animation:brainPulse 4s ease-in-out infinite}
        /* 卡片 */
        .card-wrap{perspective:1000px;position:relative;z-index:5}
        .login-card{width:420px;max-width:calc(100vw - 32px);background:var(--surface-focus);border-radius:20px;padding:44px 42px 40px;
            border:1px solid transparent;position:relative;
            box-shadow:0 25px 60px rgba(0,0,0,0.5),var(--light-depth-1),inset 0 1px 0 rgba(255,255,255,0.04);
            transform-style:preserve-3d;transition:transform 0.12s ease-out}
        .login-card::before{content:'';position:absolute;inset:-1px;border-radius:20px;border:1px solid var(--brand-border);pointer-events:none}
        .login-card::after{content:'';position:absolute;top:-1px;left:12%;right:12%;height:1px;
            background:rgba(var(--brand-rgb),0.25);border-radius:1px}
        .pulse-ring{position:absolute;inset:-40px;border-radius:30px;pointer-events:none;z-index:-1}
        .pulse-ring::before,.pulse-ring::after{content:'';position:absolute;inset:0;border-radius:inherit;
            border:1px solid rgba(var(--brand-rgb),0.04);animation:ringPulse 3s ease-out infinite}
        .pulse-ring::after{animation-delay:1.5s;border-color:rgba(var(--brand-rgb),0.03)}
        .corner{position:absolute;width:20px;height:20px;pointer-events:none;z-index:5}
        .corner::before,.corner::after{content:'';position:absolute;background:rgba(var(--brand-rgb),0.18);transition:all 0.3s}
        .login-card:hover .corner::before,.login-card:hover .corner::after{background:rgba(var(--brand-rgb),0.35)}
        .corner.tl{top:-1px;left:-1px}.corner.tl::before{width:20px;height:1.5px}.corner.tl::after{width:1.5px;height:20px}
        .corner.tr{top:-1px;right:-1px}.corner.tr::before{right:0;width:20px;height:1.5px}.corner.tr::after{right:0;width:1.5px;height:20px}
        .corner.bl{bottom:-1px;left:-1px}.corner.bl::before{bottom:0;width:20px;height:1.5px}.corner.bl::after{bottom:0;width:1.5px;height:20px}
        .corner.br{bottom:-1px;right:-1px}.corner.br::before{bottom:0;right:0;width:20px;height:1.5px}.corner.br::after{bottom:0;right:0;width:1.5px;height:20px}
        /* Logo */
        .login-logo{text-align:center;margin-bottom:8px}
        .login-logo img{height:30px;animation:logoFloat 3s ease-in-out infinite}
        /* AI 标题区域 */
        .ai-badge{display:inline-flex;align-items:center;gap:6px;background:var(--brand-dim);
            border:1px solid var(--brand-border);border-radius:20px;padding:4px 14px;margin:0 auto 6px;font-size:10px;color:var(--brand);
            font-family:Consolas,monospace;letter-spacing:2px}
        .ai-badge .ai-icon{width:14px;height:14px;background:linear-gradient(135deg,var(--brand),var(--brand));border-radius:50%;
            display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700}
        .login-title-wrap{text-align:center;margin-bottom:24px}
        .login-title{font-size:20px;font-weight:300;color:var(--text-secondary);letter-spacing:6px;margin-bottom:4px;animation:aiTextGlow 3s ease-in-out infinite}
        .login-subtitle{font-size:11px;color:var(--text-muted);letter-spacing:3px;font-family:Consolas,monospace;
            overflow:hidden;white-space:nowrap;border-right:2px solid var(--brand-border);width:0;
            animation:typing 2s steps(18) 0.5s forwards,blink 0.8s step-end infinite;display:inline-block}
        /* 输入框 */
        .login-field{margin-bottom:18px}
        .login-label{display:block;font-size:10px;color:var(--text-secondary);margin-bottom:6px;letter-spacing:2px;text-transform:uppercase;font-family:Consolas,monospace}
        .login-input{width:100%;padding:13px 16px;background:var(--surface-3);border:1px solid rgba(30,58,95,0.3);
            border-radius:10px;color:#eef0f3;font-size:14px;font-family:Consolas,monospace;outline:none;transition:all 0.3s}
        .login-input:focus{border-color:var(--brand-border);
            box-shadow:var(--shadow-focus);background:var(--surface-3)}
        .login-input::placeholder{color:var(--text-muted)}
        /* 按钮 */
        .login-btn{width:100%;padding:14px 0;border:none;border-radius:10px;font-size:14px;font-weight:700;
            cursor:pointer;letter-spacing:3px;margin-top:8px;position:relative;overflow:hidden;
            background:linear-gradient(135deg,var(--brand),var(--brand-hover),var(--brand));background-size:300% 300%;animation:gradShift 3s ease infinite;
            color:#fff;box-shadow:var(--shadow-brand);transition:all 0.3s;text-transform:uppercase}
        .login-btn:hover{box-shadow:0 4px 12px rgba(var(--brand-rgb),0.18);transform:translateY(-2px)}
        .login-btn:disabled{background:linear-gradient(135deg,var(--surface-1-hi),var(--line));box-shadow:none;color:var(--text-secondary);animation:none}
        .login-btn::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);animation:sweep 2.5s ease-in-out infinite}
        .login-error{display:none;text-align:center;color:var(--danger);font-size:12px;margin-top:14px;padding:10px;
            background:rgba(var(--danger-rgb),0.06);border:1px solid rgba(var(--danger-rgb),0.12);border-radius:8px}
        .login-error.show{display:block;animation:shake 0.4s ease}
        .login-footer{text-align:center;margin-top:22px;font-size:9px;color:var(--surface-1-hi);letter-spacing:2px;cursor:default;user-select:none}
        /* AI Chat */
        .ai-chat{display:none;position:fixed;bottom:20px;right:20px;width:380px;height:500px;z-index:100;
            background:var(--surface-1);border:1px solid transparent;border-radius:16px;
            box-shadow:0 10px 50px rgba(0,0,0,0.6);
            flex-direction:column;overflow:hidden;animation:chatIn 0.4s ease-out}
        .ai-chat.show{display:flex}
        .ai-chat::before{content:'';position:absolute;inset:-1px;border-radius:16px;border:1px solid var(--brand-border);pointer-events:none}
        @keyframes chatIn{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:none}}
        .ai-chat-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(var(--brand-rgb),0.08)}
        .ai-chat-header span{font-size:13px;color:var(--text-secondary);font-weight:600;display:flex;align-items:center;gap:8px}
        .ai-chat-header .ai-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand));animation:pulse 2s infinite}
        .ai-chat-close{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all 0.2s}
        .ai-chat-close:hover{color:var(--danger);background:rgba(var(--danger-rgb),0.1)}
        .ai-chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
        .ai-chat-body::-webkit-scrollbar{width:3px}.ai-chat-body::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
        .chat-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;word-break:break-word}
        .chat-msg.ai{background:var(--brand-dim);border:1px solid var(--brand-border);color:var(--text-secondary);align-self:flex-start;border-bottom-left-radius:4px}
        .chat-msg.user{background:rgba(var(--brand-rgb),0.1);border:1px solid rgba(var(--brand-rgb),0.15);color:var(--text-secondary);align-self:flex-end;border-bottom-right-radius:4px}
        .chat-msg.ai .typing-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--brand);margin:0 2px;animation:pulse 1s infinite}
        .chat-msg.ai .typing-dots span:nth-child(2){animation-delay:0.2s}.chat-msg.ai .typing-dots span:nth-child(3){animation-delay:0.4s}
        .ai-chat-input{display:flex;padding:12px;gap:8px;border-top:1px solid rgba(var(--brand-rgb),0.08)}
        .ai-chat-input input{flex:1;background:var(--surface-3);border:1px solid rgba(30,58,95,0.3);border-radius:8px;padding:10px 14px;
            color:var(--text-secondary);font-size:13px;outline:none;transition:border-color 0.2s}
        .ai-chat-input input:focus{border-color:var(--brand-border)}
        .ai-chat-input input::placeholder{color:var(--text-muted)}
        .ai-chat-input button{background:linear-gradient(135deg,var(--brand),var(--brand-hover));border:none;border-radius:8px;padding:0 16px;
            color:#fff;font-size:14px;cursor:pointer;transition:all 0.2s}
        .ai-chat-input button:hover{box-shadow:0 2px 8px rgba(var(--brand-rgb),0.15)}
        .ai-chat-input button:disabled{background:var(--surface-1-hi);color:var(--text-muted);cursor:not-allowed}
        @media(max-width:480px){.ai-chat{left:10px;right:10px;bottom:10px;width:auto;height:60vh}}
        .status-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--success);margin-right:4px;
            box-shadow:0 0 8px var(--success);animation:pulse 2s ease-in-out infinite}
        .hint{text-align:center;margin-top:14px;font-size:10px;color:var(--line);display:flex;align-items:center;justify-content:center;gap:4px}
        /* HUD */
        .hud{position:fixed;z-index:3;pointer-events:none;font-family:Consolas,monospace;font-size:10px;letter-spacing:2px;line-height:2.2;color:var(--text-secondary)}
        .hud-left{left:20px;top:50%;transform:translateY(-50%)}
        .hud-right{right:20px;top:50%;transform:translateY(-50%);text-align:right}
        .hud-top{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:3;pointer-events:none;
            font-family:Consolas,monospace;font-size:11px;color:#eef0f3;letter-spacing:4px;display:flex;align-items:center;gap:16px}
        .hud-top .bar{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(226,232,240,0.5),transparent)}
        .hud-bottom{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:3;pointer-events:none;
            font-family:Consolas,monospace;font-size:10px;color:var(--text-secondary);letter-spacing:2px;display:flex;gap:30px}
        @media(max-width:480px){body{padding:16px}.login-card{width:100%;max-width:100%;padding:32px 24px 28px;border-radius:16px}
            .login-logo img{height:22px}.login-title{font-size:16px;letter-spacing:4px}.login-subtitle{font-size:10px}
            .login-input{font-size:16px;padding:14px 16px}.login-btn{padding:14px 0;font-size:14px}
            .scanline,.crt,.hud,.hud-top,.hud-bottom,.grid-floor,.ai-brain{display:none}.pulse-ring{display:none}}

        /* ============================================================
           注意力钩子 — login 第一印象配 (Phase 4)
           心法: 高级感+引导性, 克制不堆砌; 登录卡为全屏唯一 data-focal
           primary: ①登录卡焦点单点高光晕 ②登录卡入场动效 ③表单字段聚焦光晕
           secondary: ④提交按钮触发微动
           常驻呼吸 ≤3; 一屏动画 ≤5-6; prefers-reduced-motion 全程守护
           复用 common.css 注入 token: --dur-enter/--ease-expo/--light-depth-1/
           --glow-brand/--ease-hit/--dur-hit (不新增共享文件)
           ============================================================ */

        /* === ① 焦点单点高光晕 — 登录卡为全屏唯一 data-focal ===
           径向高光(外box-shadow glow + 内background-image) + 顶辉光条 + Z 轴 --light-depth-1 浮起
           单一光源左上 45°, 浮起靠阴影深度+明度阶差, 不靠变大 (准绳5) */
        .login-card[data-focal="true"]{
            box-shadow: var(--light-depth-1),
                        var(--glow-brand),
                        inset 0 1px 0 rgba(255,255,255,0.04);
            transform: translateY(-2px);
            /* 内层径向高光: 右上角品牌色微光打光, 走 background-image 叠在 panel 之上, 不增 z-index 层级 */
            background-image: radial-gradient(120% 80% at 30% 0%, rgba(var(--brand-rgb),0.10) 0%, transparent 55%);
            background-color: var(--surface-1);
        }
        /* 顶辉光条 — 焦点卡 1px brand 色高光, 暗色看板唯一允许的顶辉光 */
        .login-card[data-focal="true"]::after{
            content:''; position:absolute; top:-1px; left:18%; right:18%; height:1px;
            background: linear-gradient(90deg, transparent, var(--brand), transparent);
            opacity:0.7; border-radius:1px; pointer-events:none;
        }

        /* === ② 登录卡入场动效 — ease-expo 淡入+微上移+scale ===
           三段节奏: 入场一次性(1s ease-expo) — 不与常驻呼吸混周期 (准绳3)
           走 transform/opacity 合成层零重排 (准绳性能)
           终态停在 translateY(-2px) — 与 data-focal 焦点浮起对齐 (准绳5 Z轴景深) */
        .login-card.focal-enter{
            animation: focalEnter 1s var(--ease-expo) both;
        }
        @keyframes focalEnter{
            from{ opacity:0; transform:translateY(40px) scale(0.94); }
            to{ opacity:1; transform:translateY(-2px) scale(1); }
        }
        /* 入场级联: 标题/字段/按钮 按序 40ms 错峰淡入 (stagger ≤200ms) */
        .focal-stagger{ opacity:0; transform: translateY(12px); animation: focalStagger 0.5s var(--ease-expo) both; }
        .focal-stagger.s1{ animation-delay: 0.18s; }
        .focal-stagger.s2{ animation-delay: 0.26s; }
        .focal-stagger.s3{ animation-delay: 0.34s; }
        .focal-stagger.s4{ animation-delay: 0.42s; }
        .focal-stagger.s5{ animation-delay: 0.50s; }
        @keyframes focalStagger{ to{ opacity:1; transform:none; } }

        /* === ③ 表单字段聚焦光晕 — input focus brand 色边光+微抬升 ===
           触发瞬时 150ms 带过冲, --glow-brand 品牌色辉光 (准绳3触发节奏)
           微抬升 -1px 暗示"这里可输入", 不喧宾夺主 */
        .login-input.focal-field{
            transition: border-color var(--dur-hit) var(--ease-hit),
                        box-shadow var(--dur-hit) var(--ease-hit),
                        transform var(--dur-hit) var(--ease-hit),
                        background var(--dur-hit) var(--ease-hit);
        }
        .login-input.focal-field:focus{
            border-color: var(--brand);
            box-shadow: 0 0 0 2px rgba(var(--brand-rgb),0.22), var(--glow-brand);
            transform: translateY(-1px);
            background: var(--surface-1-hi);
        }

        /* === ④ 提交按钮触发微动 — hover 光晕 + press 回弹 ===
           --ease-hit 过冲缓动 "弹一下"的物理感; 走 transform/box-shadow 合成层 */
        .login-btn.focal-btn{
            transition: box-shadow var(--dur-hit) var(--ease-hit),
                        transform var(--dur-hit) var(--ease-hit);
        }
        .login-btn.focal-btn:hover:not(:disabled){
            box-shadow: var(--glow-brand), var(--shadow-brand);
        }
        .login-btn.focal-btn:active:not(:disabled){
            transform: translateY(1px) scale(0.985);
            transition-duration: 80ms;
        }

        /* === prefers-reduced-motion 全程守护 — 全局原子块覆盖所有动画(含SVG内联style) === */
        @media (prefers-reduced-motion: reduce){
            *,*::before,*::after{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
            .login-card.focal-enter,.focal-stagger{ opacity:1 !important; transform:none !important; }
            .login-card[data-focal="true"]{ transform: none !important; }
            .login-input.focal-field:focus{ transform: none !important; }
            .login-btn.focal-btn:active:not(:disabled){ transform: none !important; }
        }
    </style>
</head>
<body>
    <div class="grid-floor"></div>
    <div class="bg-glow g1"></div><div class="bg-glow g2"></div><div class="bg-glow g3"></div>
    <div class="scanline"></div><div class="crt"></div>
    <!-- AI 神经网络背景 -->
    <svg class="ai-brain" width="600" height="600" viewBox="0 0 600 600">
        <g stroke="rgba(1,102,177,0.08)" stroke-width="0.5" fill="none">
            <circle cx="300" cy="300" r="80" stroke-dasharray="4 4" style="animation:dataFlow 3s linear infinite"/>
            <circle cx="300" cy="300" r="140" stroke-dasharray="6 6" style="animation:dataFlow 5s linear infinite reverse"/>
            <circle cx="300" cy="300" r="200" stroke-dasharray="8 8" style="animation:dataFlow 7s linear infinite"/>
            <circle cx="300" cy="300" r="260" stroke-dasharray="10 10" style="animation:dataFlow 9s linear infinite reverse"/>
            <line x1="300" y1="100" x2="300" y2="500" stroke-dasharray="3 6"/>
            <line x1="100" y1="300" x2="500" y2="300" stroke-dasharray="3 6"/>
            <line x1="160" y1="160" x2="440" y2="440" stroke-dasharray="3 6"/>
            <line x1="440" y1="160" x2="160" y2="440" stroke-dasharray="3 6"/>
        </g>
        <g fill="#0166B1">
            <circle cx="300" cy="220" r="2" style="animation:nodeGlow 2s infinite"/><circle cx="380" cy="260" r="2" style="animation:nodeGlow 2.5s infinite 0.3s"/>
            <circle cx="380" cy="340" r="2" style="animation:nodeGlow 2s infinite 0.6s"/><circle cx="300" cy="380" r="2" style="animation:nodeGlow 2.5s infinite 0.9s"/>
            <circle cx="220" cy="340" r="2" style="animation:nodeGlow 2s infinite 1.2s"/><circle cx="220" cy="260" r="2" style="animation:nodeGlow 2.5s infinite 1.5s"/>
            <circle cx="300" cy="140" r="1.5" style="animation:nodeGlow 3s infinite"/><circle cx="430" cy="210" r="1.5" style="animation:nodeGlow 3s infinite 0.5s"/>
            <circle cx="430" cy="390" r="1.5" style="animation:nodeGlow 3s infinite 1s"/><circle cx="300" cy="460" r="1.5" style="animation:nodeGlow 3s infinite 1.5s"/>
            <circle cx="170" cy="390" r="1.5" style="animation:nodeGlow 3s infinite 2s"/><circle cx="170" cy="210" r="1.5" style="animation:nodeGlow 3s infinite 2.5s"/>
        </g>
    </svg>
    <canvas id="neuralNet"></canvas><canvas id="particles"></canvas>

    <!-- HUD -->
    <div class="hud-top"><span class="bar"></span>AI DIGITAL DASHBOARD<span class="bar"></span></div>
    <div class="hud hud-left">SYS.OK<br>AI.READY<br>NET.ON<br>MES.UP<br>GPU.IDLE</div>
    <div class="hud hud-right" id="hudR">V2.1<br>MODEL.OK<br>NODES.3<br>00:00:00<br>SECURE</div>
    <div class="hud-bottom" id="hudB"><span>INFERENCE: 0ms</span><span>TOKENS: 0</span><span>UPTIME: 0s</span></div>

    <div class="card-wrap">
    <div class="login-card focal-enter" id="loginCard" data-focal="true">
        <div class="pulse-ring"></div>
        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
        <div class="login-logo focal-stagger s1"><img src="images/logo-sm.png" alt="cviauto"></div>
        <div class="login-title-wrap focal-stagger s2">
            <div class="ai-badge"><span class="ai-icon">AI</span> POWERED SYSTEM</div>
            <div class="login-title">AI 数字化看板</div>
            <div class="login-subtitle">INTELLIGENT MANUFACTURING ANALYTICS</div>
        </div>
        <form id="loginForm" onsubmit="return doLogin(event)">
            <div class="login-field focal-stagger s3">
                <label class="login-label">账号 / USER ID</label>
                <input type="text" class="login-input focal-field" id="username" autocomplete="username" placeholder="输入 CMES 账号" required>
            </div>
            <div class="login-field focal-stagger s4">
                <label class="login-label">密码 / PASSWORD</label>
                <input type="password" class="login-input focal-field" id="password" autocomplete="current-password" placeholder="••••••••" required>
            </div>
            <div class="focal-stagger s4" style="display:flex;align-items:center;gap:8px;margin-bottom:18px">
                <input type="checkbox" id="rememberMe" checked style="accent-color:var(--brand);cursor:pointer">
                <label for="rememberMe" style="font-size:11px;color:var(--text-muted);cursor:pointer">记住登录凭据</label>
            </div>
            <button type="submit" class="login-btn focal-btn focal-stagger s5" id="loginBtn">AUTHENTICATE</button>
            <div class="login-error" id="loginError"></div>
            <div class="hint"><span class="status-dot"></span>CMES 安全认证网关</div>
        </form>
        <div class="login-footer" id="footerTap">CVIAUTO ENGINEERING PLATFORM</div>
        <div id="adminPanel" style="display:none;margin-top:18px;padding:18px;border:1px solid rgba(var(--brand-rgb),0.15);border-radius:12px;background:rgba(var(--brand-rgb),0.03)">
            <div style="font-size:9px;color:var(--brand);margin-bottom:12px;text-align:center;letter-spacing:3px;font-family:Consolas,monospace">ROOT ACCESS</div>
            <input type="password" class="login-input focal-field" id="adminKey" placeholder="ADMIN KEY" style="border-color:rgba(var(--brand-rgb),0.2)">
            <button class="login-btn" id="adminBtn" style="background:linear-gradient(135deg,var(--brand),var(--brand-hover),var(--brand));background-size:300% 300%;box-shadow:0 4px 25px rgba(var(--brand-rgb),0.3);margin-top:12px" onclick="adminLogin()">OVERRIDE</button>
        </div>
    </div>
    </div>

    <!-- AI Chat -->
    <div class="ai-chat" id="aiChat">
        <div class="ai-chat-header">
            <span><span class="ai-dot"></span>AI 助手</span>
            <button class="ai-chat-close" onclick="document.getElementById('aiChat').classList.remove('show')">&times;</button>
        </div>
        <div class="ai-chat-body" id="chatBody">
            <div class="chat-msg ai">你好！我是 CViauto AI 助手，双击页面随时唤醒我。有什么可以帮你的？</div>
        </div>
        <div class="ai-chat-input">
            <input type="text" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendChat()">
            <button onclick="sendChat()" id="chatSendBtn">▶</button>
        </div>
    </div>

    <script>
        (function(){try{var s=JSON.parse(localStorage.getItem('_login_cred')||'{}');if(s.u)document.getElementById('username').value=s.u;if(s.p)document.getElementById('password').value=atob(s.p);if(s.r===false)document.getElementById('rememberMe').checked=false}catch(e){}})();

        function doLogin(e){
            e.preventDefault();var btn=document.getElementById('loginBtn'),errEl=document.getElementById('loginError');
            var u=document.getElementById('username').value.trim(),p=document.getElementById('password').value,r=document.getElementById('rememberMe').checked;
            btn.disabled=true;btn.textContent='▶ 正在连接 MES 验证 ···';errEl.className='login-error';
            btn.style.background='linear-gradient(135deg,#1e293b,#334155)';btn.style.animation='none';
            var dots=0;var dotTimer=setInterval(function(){dots=(dots+1)%4;btn.textContent='▶ 正在验证 '+'.'.repeat(dots+1)},400);
            apiFetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})})
            .then(function(d){
                clearInterval(dotTimer);
                if(d.success){if(r)localStorage.setItem('_login_cred',JSON.stringify({u:u,p:btoa(p),r:true}));else localStorage.removeItem('_login_cred');
                    btn.textContent='✓ 验证通过';btn.style.background='var(--success)';btn.style.boxShadow='0 0 40px rgba(16,185,129,0.3)';
                    setTimeout(function(){document.body.style.transition='opacity 0.5s';document.body.style.opacity='0';setTimeout(function(){window.location.href='/'},500)},700)}
                else{errEl.textContent=d.error||'认证失败';errEl.className='login-error show';btn.disabled=false;btn.textContent='AUTHENTICATE';btn.style.background='';btn.style.animation=''}
            }).catch(function(){clearInterval(dotTimer);errEl.textContent='网络错误';errEl.className='login-error show';btn.disabled=false;btn.textContent='AUTHENTICATE';btn.style.background='';btn.style.animation=''});return false}

        var _tc=0,_tt=null;document.getElementById('footerTap').addEventListener('click',function(){_tc++;clearTimeout(_tt);_tt=setTimeout(function(){_tc=0},2000);
            if(_tc>=5){_tc=0;var p=document.getElementById('adminPanel');p.style.display=p.style.display==='none'?'block':'none';if(p.style.display==='block')document.getElementById('adminKey').focus()}});
        function adminLogin(){var k=document.getElementById('adminKey').value;if(!k)return;var b=document.getElementById('adminBtn');b.disabled=true;b.textContent='VERIFYING ···';
            apiFetch('/api/admin-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k})}).then(function(d){
                if(d.success){b.textContent='✓ GRANTED';b.style.background='var(--success)';
                    setTimeout(function(){document.body.style.transition='opacity 0.5s';document.body.style.opacity='0';setTimeout(function(){window.location.href='/'},500)},500)}
                else{b.disabled=false;b.textContent='OVERRIDE';document.getElementById('adminKey').style.borderColor='var(--danger)'}
            }).catch(function(){b.disabled=false;b.textContent='OVERRIDE'})}
        document.getElementById('adminKey').addEventListener('keydown',function(e){if(e.key==='Enter')adminLogin()});

        // 卡片3D倾斜 — prefers-reduced-motion 降级跳过 (准绳无障碍)
        var card=document.getElementById('loginCard'),mx=innerWidth/2,my=innerHeight/2;
        var _reducedMotion = (window.ATTN && ATTN.REDUCED) || (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
        document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY});
        card.addEventListener('mousemove',function(e){ if(_reducedMotion) return;
            var r=card.getBoundingClientRect();
            var x=(e.clientX-r.left)/r.width-0.5,y=(e.clientY-r.top)/r.height-0.5;
            card.style.transform='rotateY('+x*6+'deg) rotateX('+(-y*6)+'deg)'});
        card.addEventListener('mouseleave',function(){ if(_reducedMotion) return; card.style.transform='translateY(-2px)'});

        // 神经网络连线动画
        (function(){var c=document.getElementById('neuralNet');
            if(_reducedMotion){c.style.display='none';return;}  /* reduced-motion: 跳过神经网络rAF背景动画 */
            var ctx=c.getContext('2d');
            function resize(){c.width=innerWidth;c.height=innerHeight}resize();addEventListener('resize',resize);
            var nodes=[],N=70;
            for(var i=0;i<N;i++)nodes.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,
                r:Math.random()*2+0.5,pulse:Math.random()*Math.PI*2});
            var rafId=null, visible=!document.hidden;
            function draw(){ctx.clearRect(0,0,c.width,c.height);
                for(var i=0;i<nodes.length;i++){var n=nodes[i];
                    n.pulse+=0.02;n.x+=n.vx;n.y+=n.vy;
                    if(n.x<0)n.x=c.width;if(n.x>c.width)n.x=0;if(n.y<0)n.y=c.height;if(n.y>c.height)n.y=0;
                    var glow=0.3+Math.sin(n.pulse)*0.15;
                    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle='rgba(1,102,177,'+glow+')';ctx.fill();
                    for(var j=i+1;j<nodes.length;j++){var dx=nodes[j].x-n.x,dy=nodes[j].y-n.y,d=dx*dx+dy*dy;
                        if(d<20000){d=Math.sqrt(d);var a=0.08*(1-d/141);
                            ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(nodes[j].x,nodes[j].y);
                            ctx.strokeStyle='rgba(1,102,177,'+a+')';ctx.lineWidth=0.4;ctx.stroke()}}}
                rafId=requestAnimationFrame(draw)}
            // Page Visibility: 标签页隐藏时暂停rAF(省GPU/电), 可见时恢复
            document.addEventListener('visibilitychange', function(){
                if(document.hidden){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} }
                else if(!rafId){ rafId=requestAnimationFrame(draw); }
            });
            if(visible) rafId=requestAnimationFrame(draw); })();

        // HUD实时更新
        var _st=Date.now(),_tok=0;
        setInterval(function(){_tok+=Math.floor(Math.random()*8);var up=Math.floor((Date.now()-_st)/1000);var t=new Date().toTimeString().slice(0,8);
            document.getElementById('hudR').innerHTML='V2.1<br>MODEL.OK<br>NODES.3<br>'+t+'<br>SECURE';
            document.getElementById('hudB').innerHTML='<span>INFERENCE: '+Math.floor(Math.random()*4+1)+'ms</span><span>TOKENS: '+_tok+'</span><span>UPTIME: '+up+'s</span>';
        },1000);

        // 双击唤醒AI对话
        document.addEventListener('dblclick', function(e) {
            if (e.target.closest('.ai-chat') || e.target.closest('.login-card')) return;
            document.getElementById('aiChat').classList.toggle('show');
            setTimeout(function(){ document.getElementById('chatInput').focus(); }, 300);
        });

        function sendChat() {
            var input = document.getElementById('chatInput');
            var msg = input.value.trim();
            if (!msg) return;
            var body = document.getElementById('chatBody');
            var btn = document.getElementById('chatSendBtn');
            body.innerHTML += '<div class="chat-msg user">' + msg.replace(/</g,'&lt;') + '</div>';
            input.value = '';
            btn.disabled = true;
            var loadingId = 'typing_' + Date.now();
            body.innerHTML += '<div class="chat-msg ai" id="' + loadingId + '"><span class="typing-dots"><span></span><span></span><span></span></span></div>';
            body.scrollTop = body.scrollHeight;
            apiFetch('/api/ai-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: msg })
            })
            .then(function(d) {
                var el = document.getElementById(loadingId);
                if (el) el.innerHTML = (d.result || d.error || '抱歉，暂时无法回答').replace(/</g,'&lt;').replace(/\n/g,'<br>');
                body.scrollTop = body.scrollHeight;
                btn.disabled = false;
            }).catch(function() {
                var el = document.getElementById(loadingId);
                if (el) el.innerHTML = '网络错误，请稍后再试';
                btn.disabled = false;
            });
        }

// 全站联动: 注意力钩子 + 连接状态
if (window.ATTN && ATTN.autoInit) {
    ATTN.autoInit({ staggerStep: 40, scarcityDelay: 1200 });
}
if (window._setConnState) window._setConnState('live');
if (window.EventBus) {
    EventBus.on('ws:connected', function() { if (window._setConnState) window._setConnState('live'); });
    EventBus.on('ws:disconnected', function() { if (window._setConnState) window._setConnState('dead'); });
}
    </script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
